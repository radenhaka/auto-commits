name: Auto Commit
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  auto-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Auto commit
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          echo "Update $(date)" >> log.txt
          git add .
          git commit -m "daily update $(date)"
          git push
